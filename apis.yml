apis:
  - aid: amazon-vpc-lattice:amazon-vpc-lattice-api
    name: Amazon VPC Lattice API
    description: >-
      The Amazon VPC Lattice API provides programmatic access to create and
      manage service networks, services, target groups, listeners, rules, and
      access log subscriptions. It enables service-to-service connectivity
      with built-in authentication and authorization across VPCs and AWS accounts.
